[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildCommand = ""

[deploy]
startCommand = "sh -c 'cd /app/apps/api && npx prisma db push --accept-data-loss && node dist/db/seed.js; exec node dist/index.js'"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
