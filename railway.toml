[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildCommand = ""

[deploy]
startCommand = "sh -c 'cd /app/apps/api && npx prisma db push --accept-data-loss & exec node /app/apps/api/dist/index.js'"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
